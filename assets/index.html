<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tekion Video Recorder</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://sdk.twilio.com/js/video/releases/2.28.1/twilio-video.min.js"></script>
</head>
<body>
  <header>
    <a href="https://tekion.com" target="_blank" rel="noopener" class="header-logo" aria-label="Tekion">
      <svg width="120" height="22" viewBox="0 0 178 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M31.4745 6.20032C32.68 6.20032 33.657 7.19448 33.657 8.42115C33.657 9.64698 32.68 10.642 31.4745 10.642H19.0115V23.7878C19.0115 25.0145 18.0336 26.0087 16.8289 26.0087C15.6234 26.0087 14.6464 25.0145 14.6464 23.7878V10.642H2.18254C0.977845 10.642 0 9.64698 0 8.42115C0 7.19448 0.977845 6.20032 2.18254 6.20032H31.4745ZM175.904 6.22065C177.206 6.09482 178.301 7.13232 178.301 8.43065V21.774C178.301 23.054 177.763 24.3023 176.76 25.0757C175.536 26.0198 173.945 26.1598 172.601 25.4681C172.567 25.4506 172.533 25.4323 172.5 25.4123L149.09 11.7448C148.507 11.4056 147.782 11.8331 147.782 12.5165V23.7882C147.782 25.0865 146.687 26.1248 145.384 25.9982C144.25 25.8882 143.416 24.8523 143.416 23.6923V10.339C143.416 9.05732 143.956 7.80732 144.96 7.03398C146.184 6.09148 147.772 5.95315 149.116 6.64315C149.15 6.66148 149.184 6.67982 149.218 6.69982L172.626 20.3657C173.21 20.7065 173.936 20.2781 173.936 19.594V8.52648C173.936 7.36648 174.77 6.33065 175.904 6.22065ZM88.6503 6.54607C89.5553 5.73523 90.9336 5.82357 91.7313 6.74357C92.5289 7.66357 92.4413 9.0669 91.5372 9.87773C88.204 12.8677 84.8266 14.7794 81.7219 15.9927C84.8266 17.2061 88.204 19.1152 91.5372 22.1052C92.4413 22.9169 92.5289 24.3194 91.7313 25.2394C91.3005 25.7369 90.6977 25.9919 90.0933 25.9919C89.5807 25.9919 89.0655 25.8086 88.6503 25.4369C80.2297 17.8827 71.5266 18.3077 69.6438 18.5044V23.7077C69.6438 24.9352 68.6667 25.9286 67.4612 25.9286C66.2565 25.9286 65.2795 24.9352 65.2795 23.7077V8.42107C65.2795 7.1944 66.2565 6.20023 67.4612 6.20023C68.6667 6.20023 69.6438 7.1944 69.6438 8.42107V13.4769C70.4717 13.5602 72.6109 13.6869 75.4339 13.1769C80.2723 12.3044 84.7185 10.0736 88.6503 6.54607ZM59.4873 6.19998C60.6928 6.19998 61.6698 7.19415 61.6698 8.42082C61.6698 9.6003 60.7665 10.5648 59.6253 10.6373L59.4873 10.6416H45.4134C42.47 10.6416 40.0835 13.07 40.0835 16.065C40.0835 18.9949 42.3674 21.3817 45.2222 21.4841L45.4134 21.4875H59.4873C60.6928 21.4875 61.6698 22.4825 61.6698 23.7083C61.6698 24.8878 60.7665 25.8523 59.6253 25.9248L59.4873 25.9291H45.4134C40.059 25.9291 35.7193 21.5125 35.7193 16.065C35.7193 10.7005 39.9265 6.33612 45.167 6.20311L45.4134 6.19998H59.4873ZM98.4525 6.20032C99.658 6.20032 100.634 7.19448 100.634 8.42115V23.7078C100.634 24.9345 99.658 25.9287 98.4525 25.9287C97.247 25.9287 96.27 24.9345 96.27 23.7078V8.42115C96.27 7.19448 97.247 6.20032 98.4525 6.20032ZM130.635 6.20032C135.682 6.20032 139.787 10.3778 139.787 15.512V16.617C139.787 21.752 135.682 25.9287 130.635 25.9287H113.836C108.789 25.9287 104.685 21.752 104.685 16.617V15.512C104.685 10.3778 108.789 6.20032 113.836 6.20032H130.635ZM130.635 10.642H113.836C111.196 10.642 109.05 12.827 109.05 15.512V16.617C109.05 19.3028 111.196 21.4878 113.836 21.4878H130.635C133.275 21.4878 135.422 19.3028 135.422 16.617V15.512C135.422 12.827 133.275 10.642 130.635 10.642ZM57.647 13.844C58.8525 13.844 59.8295 14.8381 59.8295 16.0648C59.8295 17.2435 58.9262 18.2088 57.785 18.2813L57.647 18.2856H45.4256C44.22 18.2856 43.2438 17.2906 43.2438 16.0648C43.2438 14.8853 44.1464 13.9208 45.2875 13.8484L45.4256 13.844H57.647Z" fill="#00C3B4"/>
      </svg>
    </a>
    <span class="header-divider"></span>
    <span class="header-badge">TechCam</span>
  </header>

  <main id="app">
    <div class="layout">
      <!-- Left column: Video -->
      <section class="video-section">
        <div class="video-container">
          <div id="local-video"></div>
          <div id="no-video-placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
            <p>Camera preview will appear here</p>
          </div>
          <span id="rec-badge" class="rec-badge hidden">REC</span>
          <button id="flip-btn" class="flip-btn hidden" title="Switch camera" aria-label="Switch camera">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <!-- Camera body -->
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <!-- Clockwise rotation arrow top-right of lens -->
              <path d="M14.5 10.5A3 3 0 0 0 9 12"/>
              <polyline points="9 10 9 12 11 12"/>
              <!-- Counter arrow bottom-left of lens -->
              <path d="M9.5 13.5A3 3 0 0 0 15 12"/>
              <polyline points="15 14 15 12 13 12"/>
            </svg>
          </button>
        </div>
        <p id="status-message" class="status-message">Enter your details and click Start Video.</p>
      </section>

      <!-- Right column: Controls + Recordings -->
      <section class="controls-section">
        <div class="controls-card">
          <h2>Session Setup</h2>
          <form id="join-form" autocomplete="off">
            <label for="identity-input">Display Name</label>
            <input type="text" id="identity-input" placeholder="e.g. Jane" required>

            <label for="room-input">Room Name</label>
            <input type="text" id="room-input" placeholder="e.g. tech-42" required>

            <button type="submit" id="start-btn" class="btn btn-primary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
              Start Video
            </button>
          </form>

          <button id="stop-btn" class="btn btn-danger hidden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            Stop Video
          </button>
        </div>

        <div class="recordings-card">
          <h2>Saved Recordings</h2>
          <p id="recordings-status" class="text-muted"><span class="spinner"></span>Loading recordings...</p>
          <ul id="recordings-list"></ul>
          <div id="recordings-pagination" class="pagination hidden"></div>
        </div>
      </section>
    </div>
  </main>

  <!-- SMS modal -->
  <div id="sms-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="sms-modal-title">
    <div class="modal-container sms-modal-container">
      <div class="modal-header">
        <span id="sms-modal-title" class="modal-title">Send Recording via SMS</span>
        <button class="modal-close-btn sms-modal-close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="sms-modal-body">
        <p id="sms-recording-label" class="sms-recording-label"></p>
        <label for="sms-phone-input" class="sms-label">Customer Phone Number</label>
        <input type="tel" id="sms-phone-input" class="sms-phone-input"
               placeholder="+1 (555) 000-0000" autocomplete="tel" required>
        <p class="sms-hint">Include country code, e.g. +1 for US</p>
        <button id="sms-send-btn" class="btn btn-primary sms-send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          Send SMS
        </button>
        <p id="sms-status" class="sms-status hidden"></p>
      </div>
    </div>
  </div>

  <!-- Video playback modal -->
  <div id="video-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-container">
      <div class="modal-header">
        <span id="modal-title" class="modal-title"></span>
        <button class="modal-close-btn" aria-label="Close video">&times;</button>
      </div>
      <video id="modal-video" class="modal-video" controls playsinline></video>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
